<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genealogy Graph | Interactive Map</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>

    <header class="glass-header">
        <div class="search-container">
            <input type="text" id="memberSearch" placeholder="Поиск родственников..." autocomplete="off">
            <div id="searchResults" class="search-results-dropdown"></div>
        </div>
        <button id="resetView" class="btn-secondary">В центр</button>
    </header>

    <div id="canvas-container">
        <svg id="treeCanvas"></svg>
    </div>

    <div id="profileModal" class="modal-overlay">
        <div class="modal-content glass">
            <button class="close-modal">&times;</button>
            <div class="profile-header">
                <div class="profile-avatar" id="p-avatar"></div>
                <h2 id="p-name">Имя Фамилия</h2>
                <p id="p-dates" class="secondary-text">1900 — 1980</p>
            </div>
            <div class="profile-body">
                <div class="info-section">
                    <h4>Контакты</h4>
                    <p id="p-contact">-</p>
                </div>
                <div class="info-section">
                    <h4>Семья</h4>
                    <div id="p-relatives" class="rel-tags"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
