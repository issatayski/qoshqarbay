<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Шежіре | Генеалогиялық ағаш</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>

    <nav class="main-nav">
        <div class="nav-container">
            <div class="logo" onclick="location.reload()">
                <span class="logo-icon">🌳</span>
                <span class="logo-text">ШЕЖІРЕ</span>
            </div>
            
            <ul class="nav-menu" id="navMenu">
                <li><a href="#">Ақпарат</a></li>
                <li><a href="#">Білгенге маржан</a></li>
                <li><a href="#">Хабарласу</a></li>
            </ul>

            <div class="nav-controls">
                <div class="search-container" id="searchContainer">
                    <button class="mobile-search-trigger" id="searchTrigger">🔍</button>
                    <div class="search-wrapper" id="searchWrapper">
                        <input type="text" id="memberSearch" placeholder="Іздеу..." autocomplete="off">
                        <div id="searchResults" class="search-dropdown"></div>
                    </div>
                </div>
                
                <button id="viewFilter" class="icon-btn" title="Көріністі өзгерту">🌳</button>
                <button class="burger-menu" id="burgerBtn"><span></span></button>
            </div>
        </div>
    </nav>

    <div id="canvas-container">
        <svg id="treeCanvas">
            <defs>
                <marker id="arrowhead" viewBox="0 -5 10 10" refX="35" refY="0" markerWidth="6" markerHeight="6" orient="auto">
                    <path d="M0,-5L10,0L0,5" fill="#ccc"></path>
                </marker>
            </defs>
        </svg>
    </div>

    <div id="profileModal" class="modal-overlay">
        <div class="modal-content glass">
            <button class="close-modal">&times;</button>
            
            <div class="profile-header-new" id="profileHeaderArea" title="Картада көрсету">
                <div class="avatar-side">
                    <img id="p-photo" src="" alt="" style="display:none;">
                    <div id="p-avatar-placeholder" class="profile-avatar"></div>
                </div>
                <div class="info-side">
                    <div class="p-patronymic" id="p-patronymic"></div>
                    <h2 class="p-name" id="p-full-name"></h2>
                    <div class="p-details">
                        <div id="p-birth"></div>
                        <div id="p-death"></div>
                        <a id="p-phone-link" href="" class="p-phone"></a>
                    </div>
                </div>
            </div>

            <div class="profile-body">
                <div class="lineage-section">
                    <h4>Аталар (Предки)</h4>
                    <div id="p-ancestors" class="lineage-list-horizontal"></div>
                </div>
                <div class="lineage-section">
                    <h4>Ұрпақтар (Потомки)</h4>
                    <div id="p-descendants" class="lineage-list-horizontal"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
