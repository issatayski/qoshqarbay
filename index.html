<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Шежіре</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>

    <header class="glass-header">
        <div class="search-box">
        <div class="input-wrapper">
            <input type="text" id="memberSearch" placeholder="Есімі бойынша іздеу" autocomplete="off">
            <div id="searchResults" class="search-dropdown"></div>
        </div>
        <button id="searchBtn" class="btn-primary">Іздеу</button>
    </div>
    </header>

    <div id="canvas-container">
        <svg id="treeCanvas"></svg>
    </div>

    <div id="profileModal" class="modal-overlay">
		<div class="modal-content glass">
			<button class="close-modal">&times;</button>
			
			<div class="profile-header-new">
				<div class="avatar-side">
					<img id="p-photo" src="" alt="" style="display:none;">
					<div id="p-avatar-placeholder" class="profile-avatar"></div>
				</div>
				<div class="info-side">
					<h2 id="p-full-name"></h2>
					<div class="p-dates-row">
						<span id="p-birth"></span>
						<span id="p-death" style="display:none;"></span>
					</div>
					<a id="p-phone-link" href="" class="phone-link"></a>
				</div>
			</div>

			<div class="profile-body">
				<div class="lineage-section">
					<h4>Аталары</h4>
					<div id="p-ancestors" class="lineage-list"></div>
				</div>

				<div class="lineage-section">
					<h4>Ұрпақтар</h4>
					<div id="p-descendants" class="lineage-list"></div>
				</div>
			</div>
		</div>
	</div>

    <script src="script.js"></script>
</body>
</html>
