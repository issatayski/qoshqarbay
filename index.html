<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Шежіре | Генеалогиялық ағаш</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>

    <nav class="main-nav">
        <div class="nav-container">
            <div class="logo-group" onclick="location.reload()">
                <span class="logo-icon">🌳</span>
                <span class="logo-text">ШЕЖІРЕ</span>
            </div>
            
            <ul class="nav-links" id="navLinks">
                <li><a href="#">Ақпарат</a></li>
                <li><a href="#">Білгенге маржан</a></li>
                <li><a href="#">Хабарласу</a></li>
            </ul>

            <div class="nav-actions">
                <div class="search-engine">
                    <button class="search-toggle" id="mobileSearchBtn">🔍</button>
                    <div class="search-input-container" id="searchContainer">
                        <input type="text" id="memberSearch" placeholder="Іздеу..." autocomplete="off">
                        <div id="searchResults" class="search-results-list"></div>
                    </div>
                </div>
                
                <button id="viewFilter" class="action-icon-btn" title="Ағаш көрінісі">🌳</button>
                <button class="burger-menu" id="burgerToggle">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </div>
    </nav>

    <main id="canvas-container">
        <svg id="treeCanvas">
            <defs>
                <marker id="arrow" viewBox="0 -5 10 10" refX="35" refY="0" markerWidth="6" markerHeight="6" orient="auto">
                    <path d="M0,-5L10,0L0,5" fill="#ccc"></path>
                </marker>
            </defs>
        </svg>
    </main>

    <div id="profileModal" class="modal-overlay">
        <div class="modal-window">
            <button class="modal-close">&times;</button>
            
            <div class="profile-header-card" id="profileJumpBtn" title="Картадан көрсету">
                <div class="profile-avatar-wrapper">
                    <img id="p-photo" src="" alt="" style="display:none;">
                    <div id="p-avatar-placeholder" class="placeholder-avatar"></div>
                </div>
                <div class="profile-main-info">
                    <div class="p-patronymic" id="p-patronymic"></div>
                    <h2 class="p-name" id="p-full-name"></h2>
                    <div class="p-meta-data">
                        <div id="p-birth"></div>
                        <div id="p-death"></div>
                        <a id="p-phone-link" href="" class="p-phone-num"></a>
                    </div>
                </div>
            </div>

            <div class="profile-details-scroll">
                <div class="lineage-group">
                    <label>Аталар (Предки)</label>
                    <div id="p-ancestors" class="pills-container ancestors-list"></div>
                </div>
                <div class="lineage-group">
                    <label>Ұрпақтар (Потомки)</label>
                    <div id="p-descendants" class="pills-container descendants-list"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
