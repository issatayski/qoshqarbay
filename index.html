<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Шежіре | Генеалогиялық ағаш</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>

    <nav class="main-nav">
        <div class="nav-container">
            <div class="logo-section" onclick="location.reload()">
                <span class="logo-icon">🌳</span>
                <span class="logo-text">ШЕЖІРЕ</span>
            </div>
            
            <ul class="nav-menu" id="navMenu">
                <li><a href="#">Ақпарат</a></li>
                <li><a href="#">Білгенге маржан</a></li>
                <li><a href="#">Хабарласу</a></li>
            </ul>

            <div class="nav-controls">
                <div class="search-area">
                    <button class="mobile-only-btn" id="mobileSearchOpen">🔍</button>
                    <div class="search-box-wrapper" id="searchWrapper">
                        <input type="text" id="memberSearch" placeholder="Іздеу..." autocomplete="off">
                        <div id="searchResults" class="search-dropdown"></div>
                    </div>
                </div>
                
                <button id="viewFilter" class="control-btn" title="Ағаш көрінісі">🌳</button>
                <button class="burger-btn" id="burgerBtn"><span></span></button>
            </div>
        </div>
    </nav>

    <div id="canvas-container">
        <svg id="treeCanvas">
            <defs>
                <marker id="arrowhead" viewBox="0 -5 10 10" refX="35" refY="0" markerWidth="6" markerHeight="6" orient="auto">
                    <path d="M0,-5L10,0L0,5" fill="#ccc"></path>
                </marker>
            </defs>
        </svg>
    </div>

    <div id="profileModal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-modal">&times;</button>
            
            <div class="profile-main-header" id="jumpToNode" title="Картадан көру">
                <div class="p-avatar-box">
                    <img id="p-photo" src="" alt="" style="display:none;">
                    <div id="p-avatar-placeholder" class="empty-avatar"></div>
                </div>
                <div class="p-info-box">
                    <div class="p-patronymic" id="p-patronymic"></div>
                    <h2 class="p-name" id="p-full-name"></h2>
                    <div class="p-meta">
                        <span id="p-birth"></span>
                        <span id="p-death"></span>
                        <a id="p-phone-link" href="" class="p-phone"></a>
                    </div>
                </div>
            </div>

            <div class="profile-scroll-area">
                <div class="lineage-block">
                    <h4>Аталар (Предки)</h4>
                    <div id="p-ancestors" class="p-pills-row"></div>
                </div>
                <div class="lineage-block">
                    <h4>Ұрпақтар (Потомки)</h4>
                    <div id="p-descendants" class="p-pills-row"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
